on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

name: Precip and Snotel Plots

# Grant write permission to the GITHUB_TOKEN
permissions:
  contents: write

jobs:
  run-r-script:
    runs-on: macos-latest
    env: 
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      
      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with: 
          use-public-rspm: true

      - name: Install Packages
        run: |
          Rscript -e 'install.packages(c("ggplot2", "tidyverse", "data.table", "ggforce", "httr"))'
            
      - name: run-script
        run: Rscript scripts/Snotel-Plots.R        
        
      - name: commit files
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add -A
          git commit -m "Saving the results" || echo "no changes to commit"
          git push origin || echo "no changes to commit"
